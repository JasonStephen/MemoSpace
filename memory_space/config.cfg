[app]
version = demo 0.6.3

custom_font_family = "Microsoft YaHei"

[backup]
interval_minutes = 30
max_backups = 5

[i18n]
default_locale = zh-Hans
enabled_locales = zh-Hans,zh-Hant,en,ja,ko,de,es,fr,pt,ru
locale_labels = zh-Hans:简体中文,zh-Hant:繁體中文,en:English,ja:日本語,ko:한국어,de:Deutsch,es:Español,fr:Français,pt:Português,ru:Русский
locale_flags = zh-Hans:🇨🇳,zh-Hant:🇨🇳,en:🇺🇸,ja:🇯🇵,ko:🇰🇷,de:🇩🇪,es:🇪🇸,fr:🇫🇷,pt:🇵🇹,ru:🇷🇺

